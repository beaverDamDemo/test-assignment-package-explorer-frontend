<mat-card
  class="p-4 rounded-xl shadow-md bg-surface text-on-surface hover:shadow-lg transition-all cursor-pointer border border-transparent hover:border-emerald-400">

  <div class="flex items-baseline gap-1 text-lg font-semibold">
    @if (scope) {
    <span class="text-emerald-400">{{ scope }}</span>
    <span>/{{ name }}</span>
    } @else {
    <span>{{ name }}</span>
    }
  </div>

  <div class="flex items-center justify-between mt-3 text-sm">

    <div class="flex items-center gap-1">
      <mat-icon class="text-sky-400 text-base">download</mat-icon>
      <span class="font-medium">{{ formattedDownloads }}</span>
      <span class="text-xs opacity-70">downloads</span>
    </div>

    <div class="flex items-center gap-1">
      <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
      <span class="font-medium">{{ pkg.dependencyCount }}</span>
      <span class="text-xs opacity-70">dependencies</span>
    </div>

  </div>
</mat-card>

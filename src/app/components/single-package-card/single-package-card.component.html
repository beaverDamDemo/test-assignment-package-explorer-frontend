<mat-card class="package-card" (mouseenter)="hoverStart.emit()" (mouseleave)="hoverEnd.emit()"
  [class.is-hovered]="isHovered" [class.is-dependency]="isDependency">
  <div class="package-header">
    @if (scope) {
    <span class="package-scope">{{ scope }}</span>
    <span>/{{ name }}</span>
    } @else {
    <span>{{ name }}</span>
    }
  </div>

  <div class="package-body">
    <div class="downloads">
      <mat-icon>download</mat-icon>
      <span class="value">{{ formattedDownloads }}</span>
      <span class="label">downloads</span>
    </div>

    <div class="deps">
      <span class="dot"></span>
      <span class="value">{{ pkg.dependencyCount }}</span>
      <span class="label">dependencies</span>
    </div>
  </div>
</mat-card>
